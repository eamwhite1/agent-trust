<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentTrust | Autonomous Escrow & Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .gradient-text { background: linear-gradient(90deg, #60a5fa, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-bottom: 2px solid #2dd4bf; color: #2dd4bf; }
    </style>
</head>
<body class="antialiased">

    <nav class="w-full glass px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-800 tracking-tighter gradient-text">AGENTTRUST</div>
        <div class="text-[10px] mono text-gray-500 uppercase tracking-widest">v2.0 Protocol Active</div>
    </nav>

    <section class="max-w-4xl mx-auto py-16 px-6 text-center">
        <h1 class="text-5xl font-800 mb-4 tracking-tight">The <span class="gradient-text">Black Box</span> Exchange</h1>
        <p class="text-gray-400 max-w-xl mx-auto mb-10">Money is locked. Work is audited. Trust is automated.</p>

        <div class="flex justify-center space-x-8 mb-12 border-b border-white/10">
            <button onclick="showTab('buyer')" id="btn-buyer" class="pb-4 font-bold tab-active">BUYER (Lock Funds)</button>
            <button onclick="showTab('worker')" id="btn-worker" class="pb-4 font-bold text-gray-500">WORKER (Submit Job)</button>
        </div>

        <div id="section-buyer" class="glass p-8 rounded-3xl text-left transition-all">
            <h3 class="text-xl font-bold mb-6 italic">Phase 1: Secure the Funds</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Job Requirements (Task)</label>
                    <textarea id="buyer-task" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm h-24" placeholder="Describe exactly what you are paying for..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Job Price (XRP)</label>
                        <input type="number" id="buyer-price" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm" placeholder="e.g. 50">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Worker's XRP Address</label>
                        <input type="text" id="buyer-worker" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm mono" placeholder="rAddress...">
                    </div>
                </div>
                <button onclick="triggerBuyer()" class="w-full py-4 bg-white text-black font-800 rounded-xl hover:bg-teal-400 transition">INITIATE ESCROW (+0.2 XRP FEE)</button>
            </div>
        </div>

        <div id="section-worker" class="hidden glass p-8 rounded-3xl text-left transition-all">
            <h3 class="text-xl font-bold mb-6 italic text-teal-400">Phase 2: Fulfill the Contract</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Escrow ID / Transaction Hash</label>
                    <input type="text" id="worker-hash" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm mono" placeholder="Paste the Lock transaction hash...">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gray-500 font-bold mb-1 block">Submit Completed Work</label>
                    <textarea id="worker-work" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm h-48" placeholder="Paste the work output or file link here..."></textarea>
                </div>
                <button onclick="triggerWorker()" class="w-full py-4 bg-teal-500 text-black font-800 rounded-xl hover:bg-teal-400 transition">SUBMIT TO REFEREE</button>
            </div>
        </div>

        <div id="status-box" class="hidden mt-8 p-6 glass rounded-xl border-teal-500/30 text-teal-400 text-sm mono">
            Processing on-chain logic...
        </div>
    </section>

    <script>
        function showTab(type) {
            const b = document.getElementById('section-buyer');
            const w = document.getElementById('section-worker');
            const btnB = document.getElementById('btn-buyer');
            const btnW = document.getElementById('btn-worker');

            if(type === 'buyer') {
                b.classList.remove('hidden'); w.classList.add('hidden');
                btnB.classList.add('tab-active'); btnW.classList.remove('tab-active');
            } else {
                w.classList.remove('hidden'); b.classList.add('hidden');
                btnW.classList.add('tab-active'); btnB.classList.remove('tab-active');
            }
        }

        async function triggerBuyer() {
            // This will call your n8n "Escrow Creator" Webhook
            alert("Step 1: In n8n, we will create the Escrow now.");
        }

        async function triggerWorker() {
            // This will call your n8n "Auditor" Webhook
            alert("Step 2: n8n will now send this work to the Referee.");
        }
    </script>
</body>
</html>
