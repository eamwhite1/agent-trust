    <title>AgentTrust | Autonomous Escrow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen">

                        <label class="block text-sm text-slate-400 mb-1">Job Price (XRP)</label>
                        <input id="jobPrice" type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3" placeholder="10">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Worker's XRP Address</label>
                        <input id="workerAddr" type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3" placeholder="rP...address">
                    </div>

                        Deploy Smart Escrow
                    </button>
                </div>
            </div>
